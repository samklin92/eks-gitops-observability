## kube-prometheus-stack values
## Applied by ArgoCD via argocd/bootstrap/00-kube-prometheus-stack.yaml

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    # Auto-discover PrometheusRule CRDs across all namespaces, not just
    # ones with a specific release label - keeps alerts/ decoupled from
    # this chart's own release name.
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}

alertmanager:
  alertmanagerSpec:
    # References a Secret created manually (kubectl), never committed to Git:
    #   kubectl -n monitoring create secret generic alertmanager-slack-webhook \
    #     --from-literal=webhook-url='https://hooks.slack.com/services/...'
    secrets:
      - alertmanager-slack-webhook
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-alerts
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: slack-alerts
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
            channel: "#alerts"
            send_resolved: true
            title: "{{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"

grafana:
  adminPassword: "" # left empty - Helm generates a random one; retrieve via kubectl, never hardcode here
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  defaultDashboardsEnabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
