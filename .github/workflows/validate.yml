name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: validate argocd Application manifests
        run: |
          if find argocd -name "*.yaml" | grep -q .; then
            find argocd -name "*.yaml" -print0 | xargs -0 kubeconform \
              -schema-location default \
              -ignore-missing-schemas \
              -summary
          else
            echo "No YAML manifests yet under argocd/ - skipping validation"
          fi

      - name: validate alerts and dashboards manifests
        run: |
          find alerts dashboards -name "*.yaml" -print0 2>/dev/null | xargs -0 -r kubeconform \
            -schema-location default \
            -ignore-missing-schemas \
            -summary
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
